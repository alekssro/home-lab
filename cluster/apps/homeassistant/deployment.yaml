---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant
  namespace: homeassistant
  labels:
    app: homeassistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: homeassistant
  template:
    metadata:
      annotations:
        configmap.reloader.stakater.com/reload: homeassistant-config
        secret.reloader.stakater.com/reload: home-assistant-secret
      labels:
        app: homeassistant
    spec:
      hostNetwork: true
      containers:
        - image: ghcr.io/home-assistant/home-assistant:2026.7.2
          name: home-assistant
          env:
            - name: TZ
              value: "Europe/Madrid"
            - name: DBUS_SYSTEM_BUS_ADDRESS
              value: unix:path=/var/run/dbus/system_bus_socket
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
                - SYS_ADMIN
          resources:
            requests:
              cpu: 250m
              memory: 2.2Gi
            limits:
              memory: 2.2Gi
          volumeMounts:
            - mountPath: "/config"
              name: home-assistant-pvc
            - mountPath: "/config/configuration.yaml"
              name: home-assistant-config
              subPath: configuration.yaml
            - mountPath: "/config/templates.yaml"
              name: home-assistant-config
              subPath: templates.yaml
            - mountPath: "/etc/resolv.conf"
              name: home-assistant-config
              subPath: resolv.conf
            - mountPath: "/config/SERVICE_ACCOUNT.JSON"
              name: home-assistant-secret
              subPath: SERVICE_ACCOUNT.JSON
            - mountPath: "/var/run/dbus"
              name: dbus
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    python3 -c "
                    from pathlib import Path
                    for p in Path('/usr/local/lib/').glob('**/aiopvpc/pvpc_tariff.py'):
                        t = p.read_text()
                        old = 'national_holiday = day in _NATIONAL_EXTRA_HOLIDAYS_FOR_P3_PERIOD[day.year]'
                        new = 'national_holiday = day in _NATIONAL_EXTRA_HOLIDAYS_FOR_P3_PERIOD.get(day.year, set())'
                        if old in t:
                            p.write_text(t.replace(old, new))
                            print(f'Parcheado con éxito en: {p}')
                        else:
                            print(f'No se encontró el patrón en: {p} (quizás ya está parcheado)')
                    "
      nodeSelector:
        kubernetes.io/hostname: nuc7pjyhn-rookie
      volumes:
        - name: home-assistant-config
          configMap:
            name: homeassistant-config
        - name: home-assistant-secret
          secret:
            secretName: home-assistant-secret
        - name: home-assistant-pvc
          persistentVolumeClaim:
            claimName: home-assistant-pvc
        - name: dbus
          hostPath:
            path: "/var/run/dbus"


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nut-upsd
  namespace: homeassistant
  labels:
    app: nut-upsd
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nut-upsd
  template:
    metadata:
      annotations:
        reload.stakater.com/auto: "true"
      labels:
        app: nut-upsd
    spec:
      hostNetwork: true
      containers:
        - name: nut-upsd
          image: instantlinux/nut-upsd:2.8.3-r2
          command:
            - /bin/sh
            - -c
            - |
              # Reset USB device 0665:5161 using sysfs if available
              for dev in /sys/bus/usb/devices/*; do
                if [ -f "$dev/idVendor" ] && [ -f "$dev/idProduct" ]; then
                  vid=$(cat "$dev/idVendor")
                  pid=$(cat "$dev/idProduct")
                  if [ "$vid" = "0665" ] && [ "$pid" = "5161" ]; then
                    dev_name=$(basename "$dev")
                    echo "Resetting USB device $dev_name (0665:5161)..."
                    if [ -f "/sys/bus/usb/devices/$dev_name/authorized" ]; then
                      echo 0 > "/sys/bus/usb/devices/$dev_name/authorized"
                      sleep 1
                      echo 1 > "/sys/bus/usb/devices/$dev_name/authorized"
                      echo "Reset completed via authorization toggle."
                    else
                      # Fallback to unbind/bind
                      driver_dir="/sys/bus/usb/drivers/usb"
                      if [ -f "$driver_dir/unbind" ] && [ -f "$driver_dir/bind" ]; then
                        echo -n "$dev_name" > "$driver_dir/unbind"
                        sleep 1
                        echo -n "$dev_name" > "$driver_dir/bind"
                        echo "Reset completed via driver unbind/bind."
                      fi
                    fi
                    break
                  fi
                fi
              done

              (while [ ! -f /etc/nut/upsmon.conf ]; do sleep 1; done; echo "DEADTIME 25" >> /etc/nut/upsmon.conf) &
              exec /usr/local/bin/entrypoint.sh
          env:
            - name: API_USER
              valueFrom:
                secretKeyRef:
                  name: home-assistant-secret
                  key: NUT_UPS_API_USER
            - name: API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: home-assistant-secret
                  key: NUT_UPS_API_PASSWORD
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: home-assistant-secret
                  key: NUT_UPS_ADMIN_PASSWORD
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 128Mi
          ports:
            - containerPort: 3493
              name: nut
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - upsc
                - ups@localhost
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: sai-usb-devices
              mountPath: /dev/bus/usb # SAI
            - name: nut-upsd-config
              mountPath: /etc/nut/local/ups.conf
              subPath: ups.conf
            - name: sys-fs
              mountPath: /sys
      nodeSelector:
        kubernetes.io/hostname: nuc7pjyhn-rookie
      volumes:
        - name: sai-usb-devices
          hostPath:
            path: /dev/bus/usb  # SAI
        - name: nut-upsd-config
          configMap:
            name: nut-upsd-config
        - name: sys-fs
          hostPath:
            path: /sys

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant-matter
  namespace: homeassistant
  labels:
    app: homeassistant-matter
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: homeassistant-matter
  template:
    metadata:
      labels:
        app: homeassistant-matter
    spec:
      hostNetwork: true
      initContainers:
        - name: wait-for-homeassistant
          image: busybox:1.38
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for Home Assistant to be ready at localhost:8123..."
              # This works because both pods use hostNetwork: true on the same node
              while ! wget -q --spider http://localhost:8123; do
                echo "Home Assistant not up yet, retrying in 5s..."
                sleep 5
              done

              echo "Home Assistant is READY."
              echo "Waiting an additional 30 seconds before starting Matter server..."
              sleep 30
              echo "Init container finished."
      containers:
        - image: ghcr.io/home-assistant-libs/python-matter-server:8.1
          name: home-assistant-matter
          env:
            - name: TZ
              value: "Europe/Madrid"
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
                - SYS_ADMIN
          resources:
            requests:
              cpu: 50m
              memory: 192Mi
            limits:
              memory: 192Mi
          volumeMounts:
            - mountPath: "/data"
              name: home-assistant-matter-pvc
            - mountPath: "/var/run/dbus"
              name: dbus
      nodeSelector:
        kubernetes.io/hostname: nuc7pjyhn-rookie
      volumes:
        - name: home-assistant-matter-pvc
          persistentVolumeClaim:
            claimName: home-assistant-matter-pvc
        - name: dbus
          hostPath:
            path: "/var/run/dbus"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant-mqtt
  namespace: homeassistant
  labels:
    app: mosquitto
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mosquitto
  template:
    metadata:
      annotations:
        configmap.reloader.stakater.com/reload: mosquitto-config
        secret.reloader.stakater.com/reload: home-assistant-secret
      labels:
        app: mosquitto
    spec:
      hostNetwork: true
      securityContext:
        runAsUser: 1883
        runAsGroup: 1883
      containers:
        - image: eclipse-mosquitto:2.0.22
          name: mosquitto
          env:
            - name: TZ
              value: "Europe/Madrid"
          ports:
            - containerPort: 1883
              name: mqtt
            - containerPort: 9001
              name: mqtt-websocket
          resources:
            requests:
              cpu: 20m
              memory: 128Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - mountPath: "/mosquitto"
              name: home-assistant-mqtt-pvc
            - mountPath: /mosquitto/config/mosquitto.conf
              subPath: mosquitto.conf
              name: mosquitto-config
            - mountPath: "/mosquitto/config/mosquitto.passwd"
              name: home-assistant-secret
              subPath: MOSQUITTO_PASSWORD_FILE
      nodeSelector:
        kubernetes.io/hostname: nuc7pjyhn-rookie
      volumes:
        - name: home-assistant-mqtt-pvc
          persistentVolumeClaim:
            claimName: home-assistant-mqtt-pvc
        - name: mosquitto-config
          configMap:
            name: mosquitto-config
        - name: home-assistant-secret
          secret:
            secretName: home-assistant-secret

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant-esphome
  namespace: homeassistant
  labels:
    app: esphome
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: esphome
  template:
    metadata:
      labels:
        app: esphome
    spec:
      hostNetwork: true
      containers:
        - image: esphome/esphome:2026.6
          name: esphome
          env:
            - name: TZ
              value: "Europe/Madrid"
          ports:
            - containerPort: 6052
              name: esphome
          volumeMounts:
            - mountPath: "/config"
              name: config
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
      nodeSelector:
        kubernetes.io/hostname: nuc7pjyhn-rookie
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: home-assistant-esphome-pvc

