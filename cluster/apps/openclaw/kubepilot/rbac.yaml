---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-kubepilot
  namespace: openclaw
  labels:
    app: openclaw-kubepilot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-kubepilot-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "namespaces", "persistentvolumeclaims", "nodes", "services", "endpoints", "configmaps", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-kubepilot-reader-binding
subjects:
  - kind: ServiceAccount
    name: openclaw-kubepilot
    namespace: openclaw
roleRef:
  kind: ClusterRole
  name: openclaw-kubepilot-reader
  apiGroup: rbac.authorization.k8s.io
