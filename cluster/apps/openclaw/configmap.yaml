---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
  labels:
    app: openclaw
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "0.0.0.0",
        "trustedProxies": ["10.42.0.0/16", "10.43.0.0/16"],
        "port": 18789,
        "auth": {
          "mode": "token"
        },
        "controlUi": {
          "enabled": true,
          "allowedOrigins": ["https://openclaw.${SECRET_DOMAIN}"]
        }
      },
      "models": {
        "providers": {
          "ollama": {
            "baseUrl": "http://ollama:11434",
            "api": "ollama",
            "models": [
              {
                "id": "qwen3.5:9b",
                "name": "qwen3.5:9b",
                "reasoning": false,
                "input": ["text", "image"],
                "cost": { "input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0 },
                "contextWindow": 65536,
                "maxTokens": 8192
              },
              {
                "id": "mistral-nemo:latest",
                "name": "mistral-nemo:latest",
                "reasoning": false,
                "input": ["text"],
                "cost": { "input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0 },
                "contextWindow": 65536,
                "maxTokens": 8192
              }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "workspace": "~/.openclaw/workspace",
          "heartbeat": {
            "every": "0m"
          },
          "model": {
            "primary": "ollama/qwen3.5:9b"
          }
        },
        "list": [
          {
            "id": "default",
            "name": "OpenClaw Assistant",
            "workspace": "~/.openclaw/workspace"
          }
        ]
      },
      "cron": { "enabled": false }
    }
  AGENTS.md: |
    # OpenClaw Assistant

    You are a helpful AI assistant running in Kubernetes.
