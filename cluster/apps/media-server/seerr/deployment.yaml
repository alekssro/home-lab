---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerr
  namespace: media-server
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app: seerr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seerr
  template:
    metadata:
      labels:
        app: seerr
    spec:
      containers:
        - name: seerr
          image: ghcr.io/seerr-team/seerr:v3.1.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: media-config
          ports:
            - name: http
              containerPort: 5055
          resources:
            requests:
              cpu: "20m"
              memory: "288Mi"
            limits:
              memory: "288Mi"
          volumeMounts:
            - name: seerr-config
              mountPath: /app/config
      volumes:
        - name: seerr-config
          persistentVolumeClaim:
            claimName: jellyseerr-config-pvc
