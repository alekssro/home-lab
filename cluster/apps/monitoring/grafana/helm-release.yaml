---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 5m
  chart:
    spec:
      chart: grafana
      version: 10.5.15
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
        namespace: flux-system
      interval: 5m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    adminPassword: admin
    deploymentStrategy:
      type: Recreate
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-production"
        traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
        traefik.ingress.kubernetes.io/router.middlewares: "networking-internal-only@kubernetescrd"
      hosts:
        - "grafana.${SECRET_DOMAIN}"
      tls:
        - secretName: grafana-tls
          hosts:
            - "grafana.${SECRET_DOMAIN}"
    persistence:
      enabled: true
      type: pvc
      existingClaim: grafana-pvc
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            access: proxy
            url: http://prometheus-service.monitoring.svc.cluster.local:9090
            isDefault: true
            uid: prometheus
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: 'default'
            orgId: 1
            folder: ''
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/default
    dashboards:
      default:
        kubernetes-pods:
          gnetId: 3119
          revision: 2
          datasource: Prometheus
        kubernetes-nodes:
          gnetId: 15760
          revision: 1
          datasource: Prometheus
    alerting:
      rules.yaml:
        apiVersion: 1
        groups:
          - orgId: 1
            name: 'HomeLab Alerts'
            rules:
              - uid: 'container-cpu-high'
                title: 'Container High CPU Usage'
                condition: 'B'
                data:
                  - refId: 'A'
                    relativeTimeRange:
                      from: 300
                      to: 0
                    datasourceUid: 'prometheus'
                    model:
                      expr: 'sum(rate(container_cpu_usage_seconds_total{container!=""}[5m])) by (pod, namespace) > 0.85'
                      intervalMs: 10000
                      maxDataPoints: 43200
                      refId: 'A'
                  - refId: 'B'
                    datasourceUid: '__expr__'
                    model:
                      expression: 'A'
                      type: 'classic_conditions'
                      refId: 'B'
                      conditions:
                        - evaluator:
                            params:
                              - 0.85
                            type: gt
                          operator:
                            type: and
                          query:
                            params:
                              - A
                          reducer:
                            params: []
                            type: last
                for: '5m'
                annotations:
                  summary: 'CPU usage of container in pod {{ "{{" }} $labels.pod {{ "}}" }} is high'
                labels:
                  severity: 'warning'
              - uid: 'container-memory-high'
                title: 'Container High Memory Usage'
                condition: 'B'
                data:
                  - refId: 'A'
                    relativeTimeRange:
                      from: 300
                      to: 0
                    datasourceUid: 'prometheus'
                    model:
                      expr: 'sum(container_memory_working_set_bytes{container!=""}) by (pod, namespace) > 500000000'
                      intervalMs: 10000
                      maxDataPoints: 43200
                      refId: 'A'
                  - refId: 'B'
                    datasourceUid: '__expr__'
                    model:
                      expression: 'A'
                      type: 'classic_conditions'
                      refId: 'B'
                      conditions:
                        - evaluator:
                            params:
                              - 500000000
                            type: gt
                          operator:
                            type: and
                          query:
                            params:
                              - A
                          reducer:
                            params: []
                            type: last
                for: '5m'
                annotations:
                  summary: 'Memory usage of container in pod {{ "{{" }} $labels.pod {{ "}}" }} is high'
                labels:
                  severity: 'warning'
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 256Mi
