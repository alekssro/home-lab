---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-domobot
  namespace: openclaw
  labels:
    app: openclaw-domobot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw-domobot
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw-domobot
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-config
          image: busybox:1.38
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              chown -R 1000:1000 /home/node/.openclaw
              cp /config/openclaw.json /home/node/.openclaw/openclaw.json
              mkdir -p /home/node/.openclaw/workspace
              cp /config/AGENTS.md /home/node/.openclaw/workspace/AGENTS.md
              cp /config/IDENTITY.md /home/node/.openclaw/workspace/IDENTITY.md
              cp /config/SOUL.md /home/node/.openclaw/workspace/SOUL.md
              cp /config/USER.md /home/node/.openclaw/workspace/USER.md
              cp /config/HEARTBEAT.md /home/node/.openclaw/workspace/HEARTBEAT.md

              # Detect CPU architecture and download GitHub CLI (gh)
              ARCH=`uname -m`
              if [ "$ARCH" = "x86_64" ]; then
                ARCH="amd64"
              elif [ "$ARCH" = "aarch64" ]; then
                ARCH="arm64"
              fi
              # Download GitHub CLI (gh)
              mkdir -p /home/node/.openclaw/bin
              TARGET_GH_VER="2.92.0"
              if [ ! -f /home/node/.openclaw/bin/gh ] || ! /home/node/.openclaw/bin/gh --version | grep -q "$TARGET_GH_VER"; then
                echo "Downloading GitHub CLI (gh) v$TARGET_GH_VER for $ARCH..."
                wget -q --no-check-certificate -O /tmp/gh.tar.gz https://github.com/cli/cli/releases/download/v"$TARGET_GH_VER"/gh_"$TARGET_GH_VER"_linux_"$ARCH".tar.gz
                tar -xzf /tmp/gh.tar.gz -C /tmp
                mv /tmp/gh_"$TARGET_GH_VER"_linux_"$ARCH"/bin/gh /home/node/.openclaw/bin/gh
                rm -rf /tmp/gh.tar.gz /tmp/gh_"$TARGET_GH_VER"_linux_"$ARCH"
                chmod +x /home/node/.openclaw/bin/gh
              fi
              chown -R 1000:1000 /home/node/.openclaw
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node/.openclaw
            - name: config
              mountPath: /config
      containers:
        - name: gateway
          image: ghcr.io/openclaw/openclaw:2026.5.7
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              if [ -n "$GITHUB_TOKEN" ]; then
                rm -f /home/node/.openclaw/.gitconfig
                git config --file /home/node/.openclaw/.gitconfig url."https://oauth2:$${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
                git config --file /home/node/.openclaw/.gitconfig user.name "Domobot Bot"
                git config --file /home/node/.openclaw/.gitconfig user.email "domobot@users.noreply.github.com"

                if [ ! -d "/home/node/.openclaw/workspace/home-lab/.git" ]; then
                  echo "Cloning home-lab repository..."
                  git clone https://github.com/alekssro/home-lab.git /home/node/.openclaw/workspace/home-lab
                fi
              fi
              exec node /app/dist/index.js gateway run
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          env:
            - name: HOME
              value: /home/node
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            - name: NODE_ENV
              value: production
            - name: PATH
              value: /home/node/.openclaw/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: OLLAMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OLLAMA_API_KEY
                  optional: true
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: GEMINI_API_KEY
                  optional: true
            - name: HOMEASSISTANT_URL
              value: "http://homeassistant.homeassistant.svc.cluster.local:8123"
            - name: HOMEASSISTANT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: HOMEASSISTANT_TOKEN
                  optional: true
            - name: MQTT_BROKER_URL
              value: "mqtt://homeassistant-mqtt.homeassistant.svc.cluster.local:1883"
            - name: MQTT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: MQTT_USERNAME
                  optional: true
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: MQTT_PASSWORD
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: GITHUB_TOKEN_DOMOBOT
                  optional: true
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: TELEGRAM_BOT_TOKEN_DOMOBOT
                  optional: true
            - name: GIT_CONFIG_GLOBAL
              value: /home/node/.openclaw/.gitconfig
          resources:
            requests:
              cpu: 51m
              memory: 512Mi
            limits:
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/readyz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node/.openclaw
            - name: tmp-volume
              mountPath: /tmp
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: openclaw-home
          persistentVolumeClaim:
            claimName: openclaw-domobot-home-pvc
        - name: config
          configMap:
            name: openclaw-domobot-config
        - name: tmp-volume
          emptyDir: {}
