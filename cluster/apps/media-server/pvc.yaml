apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-data-pvc
  namespace: media-server
spec:
  storageClassName: nfs-csi
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 2Ti # Adjust size as needed
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gluetun-tmp-pvc
  namespace: media-server
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
